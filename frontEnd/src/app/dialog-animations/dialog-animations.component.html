<h2 mat-dialog-title>Delete this course?</h2>
<mat-dialog-content>This cannot be undone.</mat-dialog-content>

<mat-dialog-actions class="row">
    <button mat-button mat-dialog-close>Cancel</button>

    <button class="btn" mat-button [mat-dialog-close]="true" (click)="removeCourse()">Delete</button>
</mat-dialog-actions>
